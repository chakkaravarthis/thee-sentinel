version: "3.9"
services:
  backend:
    build: .
    container_name: thee-sentinel-backend
    env_file: .env
    volumes:
      - sentinel_data:/app/data
    restart: unless-stopped
 
  frontend:
    build: ./frontend
    container_name: thee-sentinel-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
 
volumes:
  sentinel_data:
